name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build solution
      run: dotnet build --configuration Release --no-restore

    - name: Run tests
      run: dotnet test --no-build --verbosity normal

    - name: Publish API
      run: dotnet publish ./src/ChessAIApp -c Release -o publish/api

    - name: Publish WPF
      run: dotnet publish ./src/ChessAIWebAPI -c Release -o publish/wpf

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: app-build
        path: publish/