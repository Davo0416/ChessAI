name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore API
      run: dotnet restore ./src/ChessAIWebAPI/ChessAIWebAPI.sln

    - name: Build API
      run: dotnet build ./src/ChessAIWebAPI/ChessAIWebAPI.sln --configuration Release --no-restore

    - name: Test API
      run: dotnet test ./src/ChessAIWebAPI/ChessAIWebAPI.sln --no-build --verbosity normal


    - name: Restore WPF
      run: dotnet restore ./src/ChessAIApp/ChessAIApp.sln

    - name: Build WPF
      run: dotnet build ./src/ChessAIApp/ChessAIApp.sln --configuration Release --no-restore

    - name: Publish API
      run: dotnet publish ./src/ChessAIWebAPI -c Release -o publish/api

    - name: Publish WPF
      run: dotnet publish ./src/ChessAIApp -c Release -o publish/wpf

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: app-build
        path: publish/